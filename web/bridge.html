<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bridge throughput bench</title>
    <style>
      html, body { margin: 0; height: 100%; background: #87a8c0; overflow: hidden; color: #fff; }
      canvas { display: block; }
      #hud {
        position: absolute; top: 8px; left: 8px;
        font: 12px/1.4 ui-monospace, Menlo, monospace;
        background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 4px;
        pointer-events: none; white-space: pre; min-width: 320px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <script src="./vendor/qwebchannel/qwebchannel.js"></script>
  </head>
  <body>
    <div id="hud">connecting…</div>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      // ---- shared FBM (must match python-side area; height is JS-local) ----
      const hash = (x, y) => {
        const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return s - Math.floor(s);
      };
      const smooth = t => t * t * (3 - 2 * t);
      const noise = (x, y) => {
        const xi = Math.floor(x), yi = Math.floor(y);
        const xf = x - xi, yf = y - yi;
        const u = smooth(xf), v = smooth(yf);
        return (1-u)*(1-v)*hash(xi,yi) + u*(1-v)*hash(xi+1,yi)
             + (1-u)*v*hash(xi,yi+1)   + u*v*hash(xi+1,yi+1);
      };
      const fbm = (x, y, oct = 5) => {
        let a = 1, f = 1, s = 0, n = 0;
        for (let i = 0; i < oct; i++) { s += a * noise(x*f, y*f); n += a; a *= 0.5; f *= 2; }
        return s / n;
      };
      const heightAt = (x, z) => {
        const MAX_H = 28;
        const base  = fbm(x * 0.012 + 100, z * 0.012 + 100, 5);
        const ridge = 1 - Math.abs(fbm(x * 0.025, z * 0.025, 4) - 0.5) * 2;
        return (base * 0.7 + ridge * ridge * 0.45 - 0.35) * MAX_H;
      };

      // ---- scene ----
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87a8c0);
      scene.fog = new THREE.Fog(0x87a8c0, 90, 360);

      const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
      camera.position.set(110, 90, 110);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(devicePixelRatio);
      renderer.setSize(innerWidth, innerHeight);
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 5, 0);
      controls.enableDamping = true;
      controls.maxPolarAngle = Math.PI * 0.495;

      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      // ---- terrain (same gen as the demo so heights agree with heightAt) ----
      const SIZE = 200, SEG = 192;
      const geo = new THREE.PlaneGeometry(SIZE, SIZE, SEG, SEG);
      geo.rotateX(-Math.PI / 2);
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setY(i, heightAt(pos.getX(i), pos.getZ(i)));
      }
      geo.computeVertexNormals();
      scene.add(new THREE.Mesh(
        geo,
        new THREE.MeshStandardMaterial({ color: 0x6a8a55, roughness: 0.95 })
      ));
      scene.add(new THREE.HemisphereLight(0xbfd8ff, 0x404020, 0.6));
      const sun = new THREE.DirectionalLight(0xfff1c4, 1.2);
      sun.position.set(70, 100, 35);
      scene.add(sun);

      // ---- agents: one InstancedMesh, allocated for the largest N we expect ----
      const MAX_AGENTS = 1_000_000;  // upper bound; actual N comes from python
      const agentGeo = new THREE.ConeGeometry(0.45, 1.6, 6);
      agentGeo.translate(0, 0.8, 0);  // base at y=0
      const agentMat = new THREE.MeshStandardMaterial({ color: 0xff4d4d, roughness: 0.6 });
      let agents = null;
      const dummy = new THREE.Object3D();

      function allocAgents(n) {
        if (agents) scene.remove(agents);
        agents = new THREE.InstancedMesh(agentGeo, agentMat, n);
        agents.frustumCulled = false;  // we set matrices manually; bbox is empty
        agents.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(agents);
      }

      // ---- bridge plumbing ----
      const hud = document.getElementById('hud');
      const stats = {
        n: 0, protocol: '?', area: 0, targetHz: 0,
        tickCount: 0, bytesIn: 0, decodeMsTotal: 0, applyMsTotal: 0,
        frames: 0, lastReport: performance.now(),
        liveHz: 0, liveFps: 0, liveBps: 0, liveDecodeMs: 0, liveApplyMs: 0,
      };

      function decodeBytes(payload) {
        // QByteArray over QWebChannel (Qt 6) is transmitted as a base64 string.
        if (typeof payload === 'string') {
          const bin = atob(payload);
          const buf = new ArrayBuffer(bin.length);
          const u8 = new Uint8Array(buf);
          for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
          return new Float32Array(buf);
        }
        if (payload instanceof ArrayBuffer) return new Float32Array(payload);
        if (Array.isArray(payload)) return new Float32Array(new Uint8Array(payload).buffer);
        console.error('unknown bytes payload type', typeof payload, payload);
        return new Float32Array(0);
      }

      function applyJson(arr) {
        // arr is flat [x0, z0, x1, z1, ...]
        const n = stats.n;
        for (let i = 0; i < n; i++) {
          const x = arr[i*2], z = arr[i*2 + 1];
          dummy.position.set(x, heightAt(x, z), z);
          dummy.updateMatrix();
          agents.setMatrixAt(i, dummy.matrix);
        }
        agents.instanceMatrix.needsUpdate = true;
        agents.count = n;
      }

      function applyBytes(f32) {
        const n = stats.n;
        for (let i = 0; i < n; i++) {
          const x = f32[i*2], z = f32[i*2 + 1];
          dummy.position.set(x, heightAt(x, z), z);
          dummy.updateMatrix();
          agents.setMatrixAt(i, dummy.matrix);
        }
        agents.instanceMatrix.needsUpdate = true;
        agents.count = n;
      }

      new QWebChannel(qt.webChannelTransport, channel => {
        const bridge = channel.objects.bridge;
        bridge.config(cfgJson => {
          const cfg = JSON.parse(cfgJson);
          stats.n = cfg.n;
          stats.protocol = cfg.protocol;
          stats.area = cfg.area;
          stats.targetHz = cfg.hz;
          allocAgents(cfg.n);
          console.log(`bridge: ready n=${cfg.n} proto=${cfg.protocol} hz=${cfg.hz}`);
        });

        bridge.tickJson.connect(arr => {
          const t0 = performance.now();
          // emulate "decode" cost (none for json; just track for parity)
          const t1 = performance.now();
          applyJson(arr);
          const t2 = performance.now();
          stats.tickCount++;
          stats.bytesIn += arr.length * 8;  // approximate (numbers as 8 bytes)
          stats.decodeMsTotal += (t1 - t0);
          stats.applyMsTotal += (t2 - t1);
        });

        bridge.tickBytes.connect(payload => {
          const t0 = performance.now();
          const f32 = decodeBytes(payload);
          const t1 = performance.now();
          applyBytes(f32);
          const t2 = performance.now();
          stats.tickCount++;
          stats.bytesIn += f32.byteLength;
          stats.decodeMsTotal += (t1 - t0);
          stats.applyMsTotal += (t2 - t1);
        });
      });

      // ---- render loop + HUD update ----
      function fmt(bps) {
        if (bps > 1e6) return (bps/1e6).toFixed(2) + ' MB/s';
        if (bps > 1e3) return (bps/1e3).toFixed(1) + ' KB/s';
        return bps.toFixed(0) + ' B/s';
      }

      renderer.setAnimationLoop(() => {
        controls.update();
        renderer.render(scene, camera);
        stats.frames++;

        const now = performance.now();
        if (now - stats.lastReport >= 1000) {
          const dt = (now - stats.lastReport) / 1000;
          stats.liveHz = stats.tickCount / dt;
          stats.liveFps = stats.frames / dt;
          stats.liveBps = stats.bytesIn / dt;
          stats.liveDecodeMs = stats.tickCount ? stats.decodeMsTotal / stats.tickCount : 0;
          stats.liveApplyMs  = stats.tickCount ? stats.applyMsTotal  / stats.tickCount : 0;

          hud.textContent =
            `entities    : ${stats.n.toLocaleString()}\n` +
            `protocol    : ${stats.protocol}\n` +
            `target Hz   : ${stats.targetHz}\n` +
            `recv Hz     : ${stats.liveHz.toFixed(1)}\n` +
            `render fps  : ${stats.liveFps.toFixed(1)}\n` +
            `bridge      : ${fmt(stats.liveBps)}\n` +
            `decode/tick : ${stats.liveDecodeMs.toFixed(3)} ms\n` +
            `apply /tick : ${stats.liveApplyMs.toFixed(3)} ms`;
          window.__bridgeStats = { ...stats };
          console.log(
            `js stats: ${stats.liveHz.toFixed(1)} Hz recv  ` +
            `${stats.liveFps.toFixed(1)} fps  ` +
            `${fmt(stats.liveBps)}  ` +
            `decode=${stats.liveDecodeMs.toFixed(3)}ms  ` +
            `apply=${stats.liveApplyMs.toFixed(3)}ms`
          );

          stats.tickCount = 0; stats.bytesIn = 0;
          stats.decodeMsTotal = 0; stats.applyMsTotal = 0;
          stats.frames = 0; stats.lastReport = now;
        }
      });
    </script>
  </body>
</html>
